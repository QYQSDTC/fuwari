<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏观金融数据追踪</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 30px;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            text-align: center;
            font-size: 0.95rem;
            color: #8b949e;
            margin-bottom: 30px;
        }
        
        .chart-wrapper {
            background: rgba(13, 17, 23, 0.9);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 30px;
        }
        
        .chart-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #c9d1d9;
            margin-bottom: 20px;
        }
        
        .chart-container {
            position: relative;
            height: 500px;
        }
        
        .data-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        
        .summary-card {
            background: rgba(30, 35, 45, 0.8);
            border-radius: 15px;
            padding: 20px;
            border-left: 4px solid;
            transition: transform 0.3s ease;
        }
        
        .summary-card:hover {
            transform: translateY(-5px);
        }
        
        .summary-card:nth-child(1) { border-left-color: #00d4ff; }
        .summary-card:nth-child(2) { border-left-color: #ff6b6b; }
        .summary-card:nth-child(3) { border-left-color: #4ecdc4; }
        .summary-card:nth-child(4) { border-left-color: #ffd93d; }
        
        .card-title {
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 8px;
        }
        
        .card-value {
            font-size: 1.6rem;
            font-weight: 700;
        }
        
        .card-detail {
            font-size: 0.8rem;
            color: #6e7681;
            margin-top: 5px;
        }
        
        .card-value.cyan { color: #00d4ff; }
        .card-value.coral { color: #ff6b6b; }
        .card-value.teal { color: #4ecdc4; }
        .card-value.gold { color: #ffd93d; }
        
        .source {
            text-align: center;
            font-size: 0.8rem;
            color: #6e7681;
            margin-top: 25px;
        }
        
        @media (max-width: 900px) {
            .data-summary {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 500px) {
            .data-summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>宏观金融数据追踪</h1>
        <p class="subtitle">A股总市值 · 住户存款 · 非银机构存款 · 市值/存款比率</p>
        
        <!-- 第一张图：绝对值 -->
        <div class="chart-wrapper">
            <div class="chart-title">📊 各指标绝对值走势</div>
            <div class="chart-container">
                <canvas id="macroChart"></canvas>
            </div>
        </div>
        
        <!-- 第二张图：环比变化率 -->
        <div class="chart-wrapper">
            <div class="chart-title">📈 各指标环比变化率</div>
            <div class="chart-container">
                <canvas id="momChart"></canvas>
            </div>
        </div>
        
        <div class="data-summary">
            <div class="summary-card">
                <div class="card-title">📈 A股总市值 (3月)</div>
                <div class="card-value cyan">117.00 万亿</div>
                <div class="card-detail">环比: +0.92%</div>
            </div>
            <div class="summary-card">
                <div class="card-title">💰 住户存款 (3月)</div>
                <div class="card-value coral">173.59 万亿</div>
                <div class="card-detail">环比: +1.42%</div>
            </div>
            <div class="summary-card">
                <div class="card-title">🏦 非银机构存款 (3月)</div>
                <div class="card-value teal">36.92 万亿</div>
                <div class="card-detail">环比: -2.15%</div>
            </div>
            <div class="summary-card">
                <div class="card-title">📊 市值/存款比率 (3月)</div>
                <div class="card-value gold">67.40%</div>
                <div class="card-detail">高点: 74.14% (12月)</div>
            </div>
        </div>
        
        <p class="source">数据来源：股票市场统计表(2026年2月，3月A股总市值手动补录)、金融机构人民币信贷收支表(2026年3月)</p>
    </div>

    <script>
        // 数据准备
        const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月', '1月(26)', '2月(26)', '3月(26)'];
        const momMonths = months.slice(1);
        
        // A股总市值（万亿元）
        const marketCap = [83.90, 87.11, 87.20, 84.87, 86.90, 90.78, 94.87, 104.16, 105.99, 107.32, 105.42, 123.00, 113.5478, 115.9292, 117.00];
        
        // 住户存款（万亿元）
        const householdDeposits = [156.77, 157.38, 160.47, 159.08, 159.55, 162.03, 160.91, 161.02, 163.98, 162.64, 163.31, 165.89, 168.039091, 171.1519, 173.588952];
        
        // 非银机构存款（万亿元）
        const nonbankDeposits = [27.77, 30.58, 29.17, 31.02, 32.19, 31.61, 33.85, 35.06, 33.99, 35.99, 36.13, 35.85, 36.330862, 37.730181, 36.917132];
        
        // A股总市值/住户存款 (%)
        const ratio = marketCap.map((m, i) => (m / householdDeposits[i] * 100).toFixed(2));
        
        // 计算环比变化率函数（一阶：环比增速）
        function calcMoM(arr) {
            const result = [];
            for (let i = 1; i < arr.length; i++) {
                const change = ((arr[i] - arr[i-1]) / arr[i-1] * 100).toFixed(2);
                result.push(parseFloat(change));
            }
            return result;
        }
        
        const marketCapMoM = calcMoM(marketCap);
        const householdMoM = calcMoM(householdDeposits);
        const nonbankMoM = calcMoM(nonbankDeposits);
        const ratioMoM = calcMoM(ratio.map(r => parseFloat(r)));

        // ========== 第一张图：绝对值 ==========
        const ctx1 = document.getElementById('macroChart').getContext('2d');
        
        new Chart(ctx1, {
            type: 'line',
            data: {
                labels: months,
                datasets: [
                    {
                        label: 'A股总市值 (万亿元)',
                        data: marketCap,
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0, 212, 255, 0.1)',
                        borderWidth: 3,
                        pointStyle: 'circle',
                        pointRadius: 7,
                        pointHoverRadius: 10,
                        pointBackgroundColor: '#00d4ff',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        tension: 0.3,
                        yAxisID: 'y'
                    },
                    {
                        label: '住户存款 (万亿元)',
                        data: householdDeposits,
                        borderColor: '#ff6b6b',
                        backgroundColor: 'rgba(255, 107, 107, 0.1)',
                        borderWidth: 3,
                        pointStyle: 'rectRot',
                        pointRadius: 8,
                        pointHoverRadius: 11,
                        pointBackgroundColor: '#ff6b6b',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        tension: 0.3,
                        yAxisID: 'y'
                    },
                    {
                        label: '非银机构存款 (万亿元)',
                        data: nonbankDeposits,
                        borderColor: '#4ecdc4',
                        backgroundColor: 'rgba(78, 205, 196, 0.1)',
                        borderWidth: 3,
                        pointStyle: 'triangle',
                        pointRadius: 8,
                        pointHoverRadius: 11,
                        pointBackgroundColor: '#4ecdc4',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        tension: 0.3,
                        yAxisID: 'y'
                    },
                    {
                        label: 'A股市值/住户存款 (%)',
                        data: ratio,
                        borderColor: '#ffd93d',
                        backgroundColor: 'rgba(255, 217, 61, 0.15)',
                        borderWidth: 3,
                        pointStyle: 'star',
                        pointRadius: 9,
                        pointHoverRadius: 12,
                        pointBackgroundColor: '#ffd93d',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            color: '#c9d1d9',
                            font: { size: 13, weight: '500' },
                            usePointStyle: true,
                            padding: 20
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(13, 17, 23, 0.95)',
                        titleColor: '#fff',
                        bodyColor: '#c9d1d9',
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 1,
                        padding: 15,
                        cornerRadius: 10,
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) label += ': ';
                                if (context.datasetIndex === 3) {
                                    label += context.parsed.y + '%';
                                } else {
                                    label += context.parsed.y.toFixed(2) + ' 万亿';
                                }
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#8b949e', font: { size: 12, weight: '500' } }
                    },
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        min: 0,
                        max: 180,
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: {
                            color: '#8b949e',
                            callback: function(value) { return value + ' 万亿'; }
                        },
                        title: { display: true, text: '金额 (万亿元)', color: '#8b949e' }
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        min: 40,
                        max: 80,
                        grid: { drawOnChartArea: false },
                        ticks: {
                            color: '#ffd93d',
                            callback: function(value) { return value + '%'; }
                        },
                        title: { display: true, text: '市值/存款比率 (%)', color: '#ffd93d' }
                    }
                }
            }
        });

        // ========== 第二张图：环比变化率 ==========
        const ctx2 = document.getElementById('momChart').getContext('2d');
        
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: momMonths,
                datasets: [
                    {
                        label: 'A股总市值 环比',
                        data: marketCapMoM,
                        backgroundColor: 'rgba(0, 212, 255, 0.7)',
                        borderColor: '#00d4ff',
                        borderWidth: 2,
                        borderRadius: 4,
                        barPercentage: 0.8,
                        categoryPercentage: 0.9
                    },
                    {
                        label: '住户存款 环比',
                        data: householdMoM,
                        backgroundColor: 'rgba(255, 107, 107, 0.7)',
                        borderColor: '#ff6b6b',
                        borderWidth: 2,
                        borderRadius: 4,
                        barPercentage: 0.8,
                        categoryPercentage: 0.9
                    },
                    {
                        label: '非银机构存款 环比',
                        data: nonbankMoM,
                        backgroundColor: 'rgba(78, 205, 196, 0.7)',
                        borderColor: '#4ecdc4',
                        borderWidth: 2,
                        borderRadius: 4,
                        barPercentage: 0.8,
                        categoryPercentage: 0.9
                    },
                    {
                        label: '市值/存款比率 环比',
                        data: ratioMoM,
                        backgroundColor: 'rgba(255, 217, 61, 0.7)',
                        borderColor: '#ffd93d',
                        borderWidth: 2,
                        borderRadius: 4,
                        barPercentage: 0.8,
                        categoryPercentage: 0.9
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            color: '#c9d1d9',
                            font: { size: 13, weight: '500' },
                            usePointStyle: true,
                            pointStyle: 'rect',
                            padding: 20
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(13, 17, 23, 0.95)',
                        titleColor: '#fff',
                        bodyColor: '#c9d1d9',
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 1,
                        padding: 15,
                        cornerRadius: 10,
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) label += ': ';
                                const value = context.parsed.y;
                                const sign = value >= 0 ? '+' : '';
                                label += sign + value.toFixed(2) + '%';
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#8b949e', font: { size: 12, weight: '500' } }
                    },
                    y: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: {
                            color: '#8b949e',
                            callback: function(value) {
                                const sign = value >= 0 ? '+' : '';
                                return sign + value + '%';
                            }
                        },
                        title: {
                            display: true,
                            text: '环比变化率 (%)',
                            color: '#8b949e',
                            font: { size: 12 }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
